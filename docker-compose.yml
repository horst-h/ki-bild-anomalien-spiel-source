services:
  app:
    build: .
    ports:
      - "80:3001"
    volumes:
      - ./data:/app/packages/backend/data
    env_file:
      - .env
    environment:
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
