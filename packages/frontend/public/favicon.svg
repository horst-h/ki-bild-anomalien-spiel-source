<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#121414"/>

  <!-- Left ear (outer orange) -->
  <polygon points="3,14 8,2 13,11" fill="#E8720C"/>
  <!-- Left ear (inner) -->
  <polygon points="5.5,12.5 8,4 11,10" fill="#FEE600"/>

  <!-- Right ear (outer orange) -->
  <polygon points="19,11 24,2 29,14" fill="#E8720C"/>
  <!-- Right ear (inner) -->
  <polygon points="21,10 24,4 26.5,12.5" fill="#FEE600"/>

  <!-- Head / face base -->
  <ellipse cx="16" cy="19" rx="11" ry="10" fill="#E8720C"/>

  <!-- White cheek patches -->
  <ellipse cx="10.5" cy="21" rx="4" ry="3.5" fill="#F5F0E8"/>
  <ellipse cx="21.5" cy="21" rx="4" ry="3.5" fill="#F5F0E8"/>

  <!-- Eyes -->
  <ellipse cx="11.5" cy="17" rx="2.5" ry="2.5" fill="#1A1A1A"/>
  <ellipse cx="20.5" cy="17" rx="2.5" ry="2.5" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="12.3" cy="16.2" r="0.8" fill="white"/>
  <circle cx="21.3" cy="16.2" r="0.8" fill="white"/>

  <!-- Nose -->
  <ellipse cx="16" cy="22" rx="2" ry="1.3" fill="#1A1A1A"/>

  <!-- Muzzle line -->
  <line x1="16" y1="23.3" x2="16" y2="25" stroke="#1A1A1A" stroke-width="0.8"/>
  <line x1="13.5" y1="25" x2="18.5" y2="25" stroke="#1A1A1A" stroke-width="0.8"/>
</svg>
